# get nice colors in the terminal
## solid, widely compatible default
set -g default-terminal "screen-256color"
## true color where supported
set-option -sa terminal-overrides ",xterm*:Tc"

bind R source-file ~/.tmux.conf \; display "Tmux config reloaded!"

if-shell 'tmux show-options -s kkp-keys >/dev/null 2>&1' \
  'set -s kkp-keys on' \
  'set -s extended-keys on'

set-option -g history-limit 100000

# sensible defaults (formerly provided by tmux-sensible)
set-option -sg escape-time 10
set-option -g display-time 4000
set-option -g status-interval 5
set-option -g status-keys emacs
setw -g aggressive-resize on

set-option -g status-style 'bg=#444444,fg=#bbbbbb'
set-option -g window-status-format ' #I: #W#{?window_zoomed_flag, 🔍, } '

set-option -g window-status-last-style 'bg=#535353,fg=#999999'

set-option -g window-status-current-format ' #I: #W#{?window_zoomed_flag, 🔍, } '
set-option -g window-status-current-style 'bg=#2f2f2f,fg=yellow'

set-option -g status-left ' #S '
set-option -g status-left-length 20
set-option -g status-left-style 'fg=black,bg=yellow'

set-option -g status-right-length 100
set-option -g status-right-style 'bg=#4b4b4b,fg=#999999'
set-option -g status-right "#[default]   #(date '+%m/%d/%y  %I:%M') "

set-option -g mouse on

set-option -g focus-events on

# c-space for prefix
unbind C-b
set -g prefix C-Space
# set -g prefix C-\

# open new split panes with s and v, using vim-style definitions of split direction
unbind v
bind v split-window -h -c "#{pane_current_path}"
bind C-v split-window -h -c "#{pane_current_path}"
unbind s
bind s split-window -v -c "#{pane_current_path}"

# swap current pane with a neighbor; capitals mirror the h/j/k/l nav below
# (directions aligned to nav: J=down, L=right, unlike the original sketch)
bind H swap-pane -s '{left-of}'
bind J swap-pane -s '{down-of}'
bind K swap-pane -s '{up-of}'
bind L swap-pane -s '{right-of}'
# g resizes the current pane to the golden ratio; see below

# equal tiling
bind = select-layout tiled
# current pane becomes main window: it's big and on the left, with others stacked to its right
# main pane scales with the window (percentage support is in this fork)
set -g main-pane-width 62%
bind o select-layout main-vertical

# golden ratio
bind g run-shell 'tmux resize-pane -x $(tmux display-message -p "#{window_width}" | awk "{print int(\$1 * 0.62)}")'

# and rebind the session chooser to capital S
bind S choose-tree -Zs

# for when the split orientation just isn't hitting right
bind f next-layout
bind r rotate-window

# toggle latest windows with `
bind ` last-window

# confirm-before got old fast
bind x kill-pane
bind X kill-session

# extract current pane to separate window
bind b break-pane

# window navigation
unbind h
bind h select-pane -L
unbind j
bind j select-pane -D
unbind k
bind k select-pane -U
unbind l
bind l select-pane -R

# vim copy mode
setw -g mode-keys vi

# enter copy-mode with space
bind Space copy-mode
bind C-Space copy-mode
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection

# system clipboard via OS-agnostic helpers (~/bin/clipboard-{copy,paste})
bind -T copy-mode-vi 'y'   send-keys -X copy-pipe-and-cancel "clipboard-copy"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "clipboard-copy"
unbind p
bind p run-shell "clipboard-paste | tmux load-buffer - && tmux paste-buffer"

# open selection in copy-mode (replaces tmux-open); 'o' is other-end, so use 'O'
# editor open is OS-agnostic via the qed helper; system open is OS-specific (below)
bind -T copy-mode-vi C-o send-keys -X copy-pipe-and-cancel "xargs -I{} tmux new-window '~/bin/qed {}'"

# OS-specific config: shell path + system opener for copy-mode 'O'
if-shell 'test "$(uname)" = Darwin' {
  set-option -g default-shell /opt/homebrew/bin/zsh
  bind -T copy-mode-vi O send-keys -X copy-pipe-and-cancel "xargs open"
} {
  set-option -g default-shell /usr/bin/zsh
  bind -T copy-mode-vi O send-keys -X copy-pipe-and-cancel "xargs xdg-open"
}
